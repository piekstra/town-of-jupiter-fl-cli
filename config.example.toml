# tojfl configuration — EXAMPLE
#
# Copy to your platform config dir (run `tojfl config path` to see where) or to
# ./tojfl.toml, then fill in your values. Do NOT commit a real config: it can
# contain your utility-portal username and account identifiers.
#
# Credentials are resolved in this order (first hit wins):
#   1. --username / --password flags
#   2. TOJFL_USERNAME / TOJFL_PASSWORD environment variables
#   3. OS keychain entry (see `tojfl auth login --save`)
#   4. this config file
#
# Storing the password here is discouraged — prefer `tojfl auth login --save`,
# which puts it in your OS keychain instead.

# Portal login username (the one you registered on the utility portal).
# username = "your-portal-username"

# Password — leave unset and use the keychain instead (recommended).
# password = "" # discouraged; prefer keychain

# Default account to operate on when you have multiple linked accounts.
# The value is your 6-digit account number. Optional.
# default_account = "000000"

# Override the portal base URL (rarely needed).
# base_url = "https://utilitybill.jupiter.fl.us"

# Default output format: "table" (human), "json", or "csv" (machine).
output = "table"

# Silently re-authenticate an expired session from stored credentials
# (keychain/env/config) instead of erroring. Enabled by default; set to false
# to require an explicit `tojfl auth login` after each session timeout.
# auto_login = false

# HTTP request timeout in seconds.
timeout_secs = 30
