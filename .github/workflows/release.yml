name: Release

# Cut a release by pushing a tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
# This builds per-platform binaries and attaches them to the GitHub Release, so
# `tojfl self-update` has assets to pull. Asset names embed the Rust target
# triple, which is what the self_update client matches on.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Install Linux TLS deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --release -p tojfl-cli --target ${{ matrix.target }}

      - name: Package
        run: tar czf tojfl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release tojfl

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: tojfl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
